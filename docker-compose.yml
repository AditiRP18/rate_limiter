version: '3.9'

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      - REDIS_HOST=redis
    volumes:
      - ./.env:/app/.env:ro

volumes:
  redis-data:

